<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Una carta para ti ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: #e91e63;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-line;
        }

        .signature {
            margin-top: 30px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart {
            font-size: 40px;
            animation: heartbeat 1.5s infinite;
            margin-bottom: 15px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>Para el amor de mi vida</h1>

        <p>
Aquí va tu carta...

Puedes escribir aquí todo lo que sientes.
Cuéntale lo que significa para ti.
Recuerda momentos especiales.
Dile por qué la eliges cada día.
        </p>

        <div class="signature">
            Con todo mi amor,<br>
            [Tu nombre]
        </div>
    </div>

</body>
</html>
